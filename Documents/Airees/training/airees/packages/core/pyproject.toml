[project]
name = "airees-core"
version = "0.1.0"
description = "Airees core SDK - agents, orchestration, model routing"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.52.0",
    "httpx>=0.27.0",
    "pydantic>=2.10.0",
    "aiosqlite>=0.20.0",
    "click>=8.1.0",
    "tavily-python>=0.5.0",
    "rank-bm25>=0.2.2",
]

[project.optional-dependencies]
mcp = [
    "mcp>=1.0.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.8.0",
]

[project.scripts]
airees = "airees.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["airees"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
