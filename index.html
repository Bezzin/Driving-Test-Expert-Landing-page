<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Test Expert — We Get You Passed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: '#FCA311',
              'accent-glow': 'rgba(252, 163, 17, 0.3)',
              card: '#18181b',
              bg: '#0f0f0f',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              brand: ['Poppins', 'sans-serif'],
            },
            animation: {
              'marquee': 'marquee 25s linear infinite',
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
              'draw': 'drawArrow 2s ease-out forwards 0.5s',
              'fade-up': 'fadeInUp 0.8s ease-out forwards',
              'shimmer': 'shimmer 2.5s linear infinite',
              'pulse-glow': 'pulseGlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shine': 'shine 1.5s infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              drawArrow: {
                to: { strokeDashoffset: '0' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '200% 0' },
                '100%': { backgroundPosition: '-200% 0' }
              },
              pulseGlow: {
                '0%, 100%': { opacity: '0.5', transform: 'scale(1)' },
                '50%': { opacity: '1', transform: 'scale(1.05)' }
              },
              shine: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              }
            },
            backgroundImage: {
              'shimmer-gradient': 'linear-gradient(to right, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%)',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #0f0f0f;
        color: #e5e7eb;
      }
      .glass {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }
      .glass:hover {
        border-color: rgba(255,255,255,0.2);
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      }
      .glass-orange {
        background: rgba(252, 163, 17, 0.05);
        border: 1px solid rgba(252, 163, 17, 0.2);
        box-shadow: 0 10px 40px rgba(252, 163, 17, 0.1);
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .glass-orange:hover {
        box-shadow: 0 20px 60px rgba(252, 163, 17, 0.2);
        border-color: rgba(252, 163, 17, 0.4);
      }
      .stroke-ghost {
        -webkit-text-stroke: 1px rgba(255,255,255,0.15);
        color: transparent;
      }
      .mask-linear-gradient {
        mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
        -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
      }
    </style>
